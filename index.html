<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koko | Acesso Restrito</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: #0f0f1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  
  .login-container {
    text-align: center;
    padding: 48px;
    max-width: 420px;
    width: 90%;
  }
  
  .logo-text {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  
  .logo-accent {
    display: block;
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, #f2c541, #e8567f);
    margin: 16px auto 32px;
    border-radius: 2px;
  }
  
  .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 36px;
    font-weight: 300;
  }
  
  .input-wrapper {
    position: relative;
    margin-bottom: 20px;
  }
  
  .password-input {
    width: 100%;
    padding: 14px 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: all 0.3s ease;
  }
  
  .password-input:focus {
    border-color: #f2c541;
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 0 3px rgba(242,197,65,0.1);
  }
  
  .password-input::placeholder {
    color: rgba(255,255,255,0.25);
  }
  
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f2c541, #e8567f);
    border: none;
    border-radius: 10px;
    color: #0f0f1a;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
  }
  
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(242,197,65,0.3);
  }
  
  .error-msg {
    color: #e8567f;
    font-size: 13px;
    margin-top: 16px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  
  .error-msg.show {
    opacity: 1;
  }
  
  .bg-glow {
    position: fixed;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
  }
  
  .glow-1 {
    top: -100px;
    right: -100px;
    background: #f2c541;
  }
  
  .glow-2 {
    bottom: -100px;
    left: -100px;
    background: #e8567f;
  }
</style>
</head>
<body>

<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>

<div class="login-container" id="loginScreen">
  <div class="logo-text">KOKO</div>
  <span class="logo-accent"></span>
  <div class="subtitle">Conteúdo restrito. Digite a senha para acessar.</div>
  
  <form onsubmit="return checkPassword()">
    <div class="input-wrapper">
      <input type="password" class="password-input" id="passwordInput" placeholder="Senha de acesso" autofocus>
    </div>
    <button type="submit" class="submit-btn">Acessar</button>
  </form>
  
  <div class="error-msg" id="errorMsg">Senha incorreta. Tente novamente.</div>
</div>

<script>
const HASH = "5a6f359d5d40bc9a41439bfc814e17ee3f537028d2e59c8f5704c53cead000d4";

async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function xorDecrypt(encryptedBase64, key) {
  const encrypted = atob(encryptedBase64);
  const keyBytes = new TextEncoder().encode(key);
  const decrypted = new Uint8Array(encrypted.length);
  for (let i = 0; i < encrypted.length; i++) {
    decrypted[i] = encrypted.charCodeAt(i) ^ keyBytes[i % keyBytes.length];
  }
  return new TextDecoder().decode(decrypted);
}

async function checkPassword() {
  const pwd = document.getElementById('passwordInput').value;
  const hash = await sha256(pwd);
  
  if (hash === HASH) {
    const encrypted = document.getElementById('encData').textContent;
    const html = xorDecrypt(encrypted, pwd);
    document.open();
    document.write(html);
    document.close();
  } else {
    document.getElementById('errorMsg').classList.add('show');
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
    setTimeout(() => document.getElementById('errorMsg').classList.remove('show'), 3000);
  }
  return false;
}
</script>
